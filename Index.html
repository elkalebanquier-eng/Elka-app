<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AES Infos - Le réseau social d'Afrique</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: white;
        }
        
        /* Login */
        .login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .login-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .login-logo { font-size: 4rem; margin-bottom: 1rem; }
        .login-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .login-subtitle { color: rgba(255,255,255,0.7); margin-bottom: 2rem; }
        .google-btn {
            background: white;
            color: #1f2937;
            border: none;
            padding: 0.8rem;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }
        
        /* Bottom Navigation (TikTok style) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 0.6rem;
            z-index: 100;
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }
        .bottom-nav-item {
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.3rem;
            opacity: 0.6;
            transition: all 0.2s;
        }
        .bottom-nav-item.active { opacity: 1; color: #fbbf24; }
        
        /* Header */
        .top-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            padding: 1rem;
            z-index: 99;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #fbbf24, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .avatar-mini {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #333;
            cursor: pointer;
            border: 2px solid #fbbf24;
        }
        
        /* Reels (plein écran) */
        .reels-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
        }
        .reel {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .reel video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .reel-info {
            position: relative;
            z-index: 10;
            padding: 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            pointer-events: none;
        }
        .reel-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .reel-author-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fbbf24;
        }
        .reel-actions {
            position: absolute;
            right: 10px;
            bottom: 80px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            pointer-events: auto;
        }
        .reel-action {
            background: none;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            text-align: center;
            text-shadow: 0 0 5px black;
        }
        .reel-action span { font-size: 0.7rem; display: block; }
        .reel-hashtags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .hashtag {
            background: rgba(255,255,255,0.2);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.7rem;
        }
        
        /* Pages */
        .page {
            min-height: 100vh;
            background: #0f0f0f;
            padding-top: 70px;
            padding-bottom: 70px;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 1rem; }
        .card {
            background: #1a1a1a;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .profile-header {
            text-align: center;
            padding: 1rem;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1rem;
            border: 3px solid #fbbf24;
        }
        .btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #fbbf24;
            color: #fbbf24;
        }
        .flex { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }
        .media-grid img, .media-grid video {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 0.5rem;
        }
        .comment-item {
            padding: 0.5rem 0;
            border-bottom: 0.5px solid #333;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #1a1a1a;
            border-radius: 1rem;
            max-width: 500px;
            width: 90%;
            padding: 1.5rem;
            max-height: 80%;
            overflow-y: auto;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            border-radius: 0.8rem;
            border: none;
            background: #2a2a2a;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #fbbf24;
            color: #0f172a;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            z-index: 300;
            font-weight: 600;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-left: 0.3rem;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ========== FIREBASE CONFIG ==========
    const firebaseConfig = {
        apiKey: "AIzaSyDFanSK_ErOwE1JaezK6oOMeRalmACbrM4",
        authDomain: "aes-infos-a615c.firebaseapp.com",
        projectId: "aes-infos-a615c",
        storageBucket: "aes-infos-a615c.firebasestorage.app",
        messagingSenderId: "575243918321",
        appId: "1:575243918321:web:76abfdae28b23678a10250"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let currentUser = null;
    let currentTab = "reels";
    let onlineInterval = null;
    const appDiv = document.getElementById("app");
    
    // ========== RENDU ==========
    function render() {
        if (!currentUser) renderLogin();
        else renderMainApp();
    }
    
    function renderLogin() {
        appDiv.innerHTML = `
            <div class="login-container">
                <div class="login-card">
                    <div class="login-logo">👑</div>
                    <div class="login-title">AES Infos</div>
                    <div class="login-subtitle">Le réseau social d'Afrique</div>
                    <button id="googleBtn" class="google-btn">🔐 Se connecter avec Google</button>
                    <div id="loginError" style="color:#fbbf24; margin-top:1rem;"></div>
                </div>
            </div>
        `;
        document.getElementById("googleBtn")?.addEventListener("click", async () => {
            try {
                await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
            } catch(e) {
                document.getElementById("loginError").innerText = e.message;
            }
        });
    }
    
    async function renderMainApp() {
        const userDoc = await db.collection("users").doc(currentUser.uid).get();
        const userData = userDoc.data() || {};
        
        appDiv.innerHTML = `
            <div class="top-header">
                <div class="logo">AES👑 INFOS</div>
                <img src="${currentUser.photoURL || 'https://via.placeholder.com/40'}" class="avatar-mini" id="profileBtn">
            </div>
            <div id="pageContent"></div>
            <div class="bottom-nav">
                <button class="bottom-nav-item ${currentTab === 'reels' ? 'active' : ''}" data-tab="reels">🎬 Reels</button>
                <button class="bottom-nav-item ${currentTab === 'actualites' ? 'active' : ''}" data-tab="actualites">📰 Actus</button>
                <button class="bottom-nav-item ${currentTab === 'market' ? 'active' : ''}" data-tab="market">🛒 Market</button>
                <button class="bottom-nav-item ${currentTab === 'messages' ? 'active' : ''}" data-tab="messages">💬 Messages</button>
                <button class="bottom-nav-item ${currentTab === 'profil' ? 'active' : ''}" data-tab="profil">👤 Moi</button>
            </div>
        `;
        
        document.querySelectorAll(".bottom-nav-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                currentTab = e.target.dataset.tab;
                renderMainApp();
            });
        });
        
        document.getElementById("profileBtn")?.addEventListener("click", () => {
            currentTab = "profil";
            renderMainApp();
        });
        
        await loadPageContent(currentTab);
        
        await db.collection("users").doc(currentUser.uid).set({
            displayName: currentUser.displayName,
            email: currentUser.email,
            photoURL: currentUser.photoURL,
            online: true,
            lastSeen: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        
        if (onlineInterval) clearInterval(onlineInterval);
        onlineInterval = setInterval(() => {
            db.collection("users").doc(currentUser.uid).update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
        }, 30000);
    }
    
    async function loadPageContent(tab) {
        const container = document.getElementById("pageContent");
        if (!container) return;
        if (tab === "reels") await loadReels(container);
        else if (tab === "actualites") await loadActualites(container);
        else if (tab === "market") await loadMarket(container);
        else if (tab === "messages") await loadMessages(container);
        else if (tab === "profil") await loadProfil(container);
    }
    
    // ========== REELS (TikTok style) ==========
    async function loadReels(container) {
        let reels = [];
        try {
            const snap = await db.collection("reels").orderBy("createdAt", "desc").get();
            reels = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch(e) {}
        
        container.innerHTML = `<div class="reels-container" id="reelsContainer"></div>`;
        const reelsContainer = document.getElementById("reelsContainer");
        
        for (let reel of reels) {
            const authorSnap = await db.collection("users").doc(reel.userId).get();
            const author = authorSnap.data();
            reelsContainer.innerHTML += `
                <div class="reel" id="reel-${reel.id}">
                    <video src="${reel.videoUrl}" loop playsinline></video>
                    <div class="reel-info">
                        <div class="reel-author">
                            <img src="${author?.photoURL || 'https://via.placeholder.com/40'}" class="reel-author-img">
                            <div><b>${author?.displayName || "Anonyme"}</b></div>
                        </div>
                        <div>${escapeHtml(reel.description || "")}</div>
                        <div class="reel-hashtags">
                            ${(reel.hashtags || []).map(h => `<span class="hashtag">#${escapeHtml(h)}</span>`).join("")}
                        </div>
                    </div>
                    <div class="reel-actions">
                        <button class="reel-action" onclick="likeReel('${reel.id}')">❤️ <span>${reel.likes || 0}</span></button>
                        <button class="reel-action" onclick="showReelComments('${reel.id}')">💬 <span>${reel.commentsCount || 0}</span></button>
                    </div>
                </div>
            `;
        }
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector("video");
                if (video) {
                    if (entry.isIntersecting) video.play();
                    else video.pause();
                }
            });
        }, { threshold: 0.5 });
        
        document.querySelectorAll(".reel").forEach(reel => observer.observe(reel));
    }
    
    window.likeReel = async (reelId) => {
        await db.collection("reels").doc(reelId).update({ likes: firebase.firestore.FieldValue.increment(1) });
        showToast("Vous avez aimé ❤️");
        loadReels(document.getElementById("pageContent"));
    };
    
    window.showReelComments = async (reelId) => {
        const snap = await db.collection("reels").doc(reelId).collection("comments").orderBy("createdAt", "desc").get();
        let commentsHtml = "";
        snap.forEach(doc => {
            const c = doc.data();
            commentsHtml += `<div class="comment-item"><b>${escapeHtml(c.userName)}</b> : ${escapeHtml(c.text)}</div>`;
        });
        
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>💬 Commentaires</h3>
                <div style="max-height:300px; overflow-y:auto;">${commentsHtml || "Aucun commentaire"}</div>
                <div class="flex" style="margin-top:1rem;">
                    <input type="text" id="commentText" placeholder="Votre commentaire..." style="flex:1;">
                    <button id="sendComment" class="btn">Envoyer</button>
                </div>
                <button id="closeModal" class="btn btn-outline" style="margin-top:1rem;">Fermer</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        
        document.getElementById("sendComment").onclick = async () => {
            const text = document.getElementById("commentText").value.trim();
            if (!text) return;
            await db.collection("reels").doc(reelId).collection("comments").add({
                userId: currentUser.uid,
                userName: currentUser.displayName,
                text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("reels").doc(reelId).update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
            modal.remove();
            showToast("Commentaire ajouté");
            showReelComments(reelId);
        };
        document.getElementById("closeModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    };
    
    // ========== ACTUALITÉS (Admin) ==========
    async function loadActualites(container) {
        const isAdmin = currentUser.email === "ellabkg5@gmail.com";
        let articles = [];
        try {
            const snap = await db.collection("articles").orderBy("createdAt", "desc").get();
            articles = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch(e) {}
        
        let html = `<div class="container">`;
        if (isAdmin) {
            html += `<button id="newArticleBtn" class="btn" style="width:100%; margin-bottom:1rem;">➕ Publier une info</button>`;
        }
        for (let art of articles) {
            html += `
                <div class="card">
                    <div class="flex" style="justify-content:space-between;">
                        <div><b>AES Infos</b> ${art.breaking ? '<span style="background:#dc2626; padding:0.2rem 0.5rem; border-radius:1rem; font-size:0.7rem;">🔴 BREAKING</span>' : ''}</div>
                        <div style="font-size:0.7rem;">${art.createdAt?.toDate ? art.createdAt.toDate().toLocaleDateString() : ""}</div>
                    </div>
                    <h3 style="margin:0.5rem 0;">${escapeHtml(art.title)}</h3>
                    <p>${escapeHtml(art.content)}</p>
                    ${art.mediaUrl ? (art.mediaType === "image" ? `<img src="${art.mediaUrl}" style="max-width:100%; border-radius:1rem; margin-top:0.5rem;">` : `<video src="${art.mediaUrl}" controls style="max-width:100%; border-radius:1rem; margin-top:0.5rem;" controlsList="nodownload"></video>`) : ""}
                    <hr>
                    <div class="flex" style="justify-content:space-between;">
                        <button id="likeArticle-${art.id}" class="btn btn-outline">❤️ ${art.likes || 0}</button>
                        <button id="commentArticle-${art.id}" class="btn btn-outline">💬 ${art.commentsCount || 0}</button>
                    </div>
                    <div id="articleComments-${art.id}" style="display:none; margin-top:0.5rem;"></div>
                </div>
            `;
        }
        container.innerHTML = html + `</div>`;
        
        for (let art of articles) {
            document.getElementById(`likeArticle-${art.id}`)?.addEventListener("click", async () => {
                await db.collection("articles").doc(art.id).update({ likes: firebase.firestore.FieldValue.increment(1) });
                loadActualites(container);
                showToast("Like ajouté");
            });
            document.getElementById(`commentArticle-${art.id}`)?.addEventListener("click", () => showArticleComments(art.id));
        }
        
        if (document.getElementById("newArticleBtn")) {
            document.getElementById("newArticleBtn").onclick = () => showNewArticleForm(container);
        }
    }
    
    async function showArticleComments(articleId) {
        const snap = await db.collection("articles").doc(articleId).collection("comments").orderBy("createdAt", "desc").get();
        let html = "";
        snap.forEach(doc => {
            const c = doc.data();
            html += `<div class="comment-item"><b>${escapeHtml(c.userName)}</b> : ${escapeHtml(c.text)}</div>`;
        });
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>💬 Commentaires</h3>
                ${html || "Aucun commentaire"}
                <div class="flex" style="margin-top:1rem;"><input id="artCommentText" placeholder="Votre commentaire..."><button id="sendArtComment" class="btn">Envoyer</button></div>
                <button id="closeArtModal" class="btn btn-outline" style="margin-top:1rem;">Fermer</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        document.getElementById("sendArtComment").onclick = async () => {
            const text = document.getElementById("artCommentText").value.trim();
            if (!text) return;
            await db.collection("articles").doc(articleId).collection("comments").add({
                userId: currentUser.uid, userName: currentUser.displayName, text: text, createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection("articles").doc(articleId).update({ commentsCount: firebase.firestore.FieldValue.increment(1) });
            modal.remove();
            showToast("Commentaire ajouté");
        };
        document.getElementById("closeArtModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function showNewArticleForm(container) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📢 Nouvelle info</h3>
                <input id="artTitle" placeholder="Titre">
                <textarea id="artContent" rows="3" placeholder="Contenu"></textarea>
                <div class="flex"><input type="checkbox" id="artBreaking"> <label>🔴 Breaking news (alerte WhatsApp)</label></div>
                <input type="file" id="artMedia" accept="image/*,video/*">
                <button id="submitArticle" class="btn">Publier</button>
                <button id="cancelModal" class="btn btn-outline">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        
        document.getElementById("submitArticle").onclick = async () => {
            const title = document.getElementById("artTitle").value.trim();
            const content = document.getElementById("artContent").value.trim();
            const breaking = document.getElementById("artBreaking").checked;
            if (!title || !content) { alert("Remplissez tous les champs"); return; }
            const file = document.getElementById("artMedia").files[0];
            let mediaUrl = null, mediaType = null;
            if (file) {
                const ref = storage.ref().child(`articles/${Date.now()}_${file.name}`);
                await ref.put(file);
                mediaUrl = await ref.getDownloadURL();
                mediaType = file.type.split("/")[0];
            }
            await db.collection("articles").add({
                title, content, breaking, mediaUrl, mediaType,
                authorId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                likes: 0, commentsCount: 0
            });
            modal.remove();
            showToast("Article publié !");
            loadActualites(container);
            
            if (breaking) {
                await sendWhatsAppAlerts(title);
            }
        };
        document.getElementById("cancelModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    async function sendWhatsAppAlerts(title) {
        const usersSnap = await db.collection("users").where("phone", "!=", null).get();
        const numbers = [];
        usersSnap.forEach(doc => {
            if (doc.data().phone && doc.data().phone.length > 5) numbers.push(doc.data().phone);
        });
        if (numbers.length > 0) {
            showToast(`${numbers.length} utilisateurs seront alertés`, "📱");
            const msg = `🔴 BREAKING NEWS - AES Infos 🔴\n\n${title}\n\nTéléchargez l'application: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, "_blank");
        }
    }
    
    // ========== MARKET ==========
    async function loadMarket(container) {
        let products = [];
        try {
            const snap = await db.collection("products").orderBy("createdAt", "desc").get();
            products = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch(e) {}
        
        let html = `
            <div class="container">
                <button id="newProductBtn" class="btn" style="width:100%; margin-bottom:1rem;">➕ Mettre un produit en vente</button>
                <div class="grid-2" id="productsGrid"></div>
            </div>
        `;
        container.innerHTML = html;
        
        let productsHtml = "";
        for (let p of products) {
            const authorSnap = await db.collection("users").doc(p.userId).get();
            const author = authorSnap.data();
            productsHtml += `
                <div class="card">
                    <img src="${p.imageUrl}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:0.5rem;">
                    <div style="margin-top:0.5rem;"><b>${escapeHtml(p.title)}</b></div>
                    <div style="color:#fbbf24;">${p.price} FCFA</div>
                    <div class="flex" style="justify-content:space-between; margin-top:0.5rem;">
                        <div style="font-size:0.7rem;">📞 ${p.phone || "Non fourni"}</div>
                        <div style="font-size:0.7rem;">📍 ${p.city || ""}</div>
                    </div>
                    <button class="btn btn-outline" style="margin-top:0.5rem; width:100%;" onclick="contactSeller('${p.phone}')">💬 Contacter</button>
                </div>
            `;
        }
        document.getElementById("productsGrid").innerHTML = productsHtml || "<div class='card'>Aucun produit en vente</div>";
        
        document.getElementById("newProductBtn").onclick = () => showNewProductForm(container);
    }
    
    window.contactSeller = (phone) => {
        if (phone) window.open(`https://wa.me/${phone.replace(/[^0-9]/g, '')}`, "_blank");
        else showToast("Numéro non disponible", "⚠️");
    };
    
    function showNewProductForm(container) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>🛒 Mettre en vente</h3>
                <input id="prodTitle" placeholder="Nom du produit">
                <input id="prodPrice" placeholder="Prix (FCFA)">
                <input id="prodPhone" placeholder="Votre numéro WhatsApp">
                <input id="prodCity" placeholder="Ville">
                <input type="file" id="prodImage" accept="image/*">
                <button id="submitProduct" class="btn">Publier</button>
                <button id="cancelModal" class="btn btn-outline">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        
        document.getElementById("submitProduct").onclick = async () => {
            const title = document.getElementById("prodTitle").value.trim();
            const price = document.getElementById("prodPrice").value.trim();
            const phone = document.getElementById("prodPhone").value.trim();
            const city = document.getElementById("prodCity").value.trim();
            const file = document.getElementById("prodImage").files[0];
            if (!title || !price || !file) { alert("Titre, prix et photo requis"); return; }
            const ref = storage.ref().child(`products/${Date.now()}_${file.name}`);
            await ref.put(file);
            const imageUrl = await ref.getDownloadURL();
            await db.collection("products").add({
                title, price, phone, city, imageUrl,
                userId: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            modal.remove();
            showToast("Produit mis en vente !");
            loadMarket(container);
        };
        document.getElementById("cancelModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    // ========== MESSAGERIE ==========
    async function loadMessages(container) {
        let convs = [];
        try {
            const snap = await db.collection("conversations").where("participants", "array-contains", currentUser.uid).orderBy("lastUpdated", "desc").get();
            convs = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch(e) {}
        
        let html = `<div class="container"><button id="newMsgBtn" class="btn" style="width:100%; margin-bottom:1rem;">➕ Nouveau message</button><div id="convList"></div></div>`;
        container.innerHTML = html;
        
        let listHtml = "";
        for (let conv of convs) {
            const otherId = conv.participants.find(p => p !== currentUser.uid);
            const otherSnap = await db.collection("users").doc(otherId).get();
            const other = otherSnap.data();
            const unread = conv.unreadCount?.[currentUser.uid] || 0;
            listHtml += `
                <div class="card" data-other="${otherId}" style="cursor:pointer;">
                    <div class="flex" style="justify-content:space-between;">
                        <div class="flex"><img src="${other?.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;"> <b>${other?.displayName || otherId}</b> ${other?.online ? '<span class="online-dot"></span>' : ''}</div>
                        ${unread ? `<span style="background:#dc2626; padding:0.2rem 0.5rem; border-radius:1rem;">${unread}</span>` : ""}
                    </div>
                    <div style="font-size:0.75rem;">${escapeHtml(conv.lastMessage || "")}</div>
                </div>
            `;
        }
        document.getElementById("convList").innerHTML = listHtml || "<div class='card'>Aucune conversation</div>";
        document.querySelectorAll("[data-other]").forEach(el => {
            el.addEventListener("click", () => openChat(el.dataset.other));
        });
        document.getElementById("newMsgBtn").onclick = () => selectUserForChat();
    }
    
    async function selectUserForChat() {
        const snap = await db.collection("users").where("uid", "!=", currentUser.uid).get();
        const users = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `<div class="modal-content"><h3>Choisir un destinataire</h3><div id="userList"></div></div>`;
        document.body.appendChild(modal);
        let listHtml = "";
        for (let u of users) {
            listHtml += `<div class="card" data-uid="${u.uid}" style="cursor:pointer;"><div class="flex"><img src="${u.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;"> <b>${u.displayName || u.uid}</b></div></div>`;
        }
        document.getElementById("userList").innerHTML = listHtml;
        document.querySelectorAll("[data-uid]").forEach(el => {
            el.addEventListener("click", () => { modal.remove(); openChat(el.dataset.uid); });
        });
        modal.style.display = "flex";
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    async function openChat(otherId) {
        const participants = [currentUser.uid, otherId].sort();
        const convId = `${participants[0]}_${participants[1]}`;
        const convRef = db.collection("conversations").doc(convId);
        const convDoc = await convRef.get();
        if (!convDoc.exists) {
            await convRef.set({ participants: [currentUser.uid, otherId], lastUpdated: firebase.firestore.FieldValue.serverTimestamp(), unreadCount: { [currentUser.uid]: 0, [otherId]: 0 } });
        }
        const otherSnap = await db.collection("users").doc(otherId).get();
        const other = otherSnap.data();
        
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.style.display = "flex";
        modal.style.alignItems = "stretch";
        modal.style.flexDirection = "column";
        modal.innerHTML = `
            <div style="background:#1a1a1a; height:90%; display:flex; flex-direction:column; border-radius:1rem 1rem 0 0;">
                <div style="padding:1rem; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                    <div class="flex"><img src="${other?.photoURL || 'https://via.placeholder.com/40'}" style="width:40px; border-radius:50%; object-fit:cover;"> <b>${other?.displayName || otherId}</b></div>
                    <button id="closeModal" style="background:none; border:none; color:white; font-size:1.5rem;">&times;</button>
                </div>
                <div id="chatMsgs" style="flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column;"></div>
                <div style="padding:0.8rem; display:flex; gap:0.5rem;">
                    <input id="chatInput" placeholder="Message..." style="flex:1;">
                    <button id="sendMsg" class="btn">Envoyer</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const messagesRef = convRef.collection("messages").orderBy("createdAt");
        const unsubscribe = messagesRef.onSnapshot(snapshot => {
            const container = document.getElementById("chatMsgs");
            if (!container) return;
            container.innerHTML = "";
            snapshot.forEach(doc => {
                const msg = doc.data();
                const isSent = msg.fromUid === currentUser.uid;
                container.innerHTML += `<div style="max-width:80%; align-self:${isSent ? 'flex-end' : 'flex-start'}; background:${isSent ? '#fbbf24' : '#333'}; color:${isSent ? '#0f172a' : 'white'}; padding:0.5rem 1rem; border-radius:1rem; margin-bottom:0.5rem;">${escapeHtml(msg.text)}</div>`;
                if (!isSent && !msg.read) {
                    doc.ref.update({ read: true });
                    convRef.update({ [`unreadCount.${currentUser.uid}`]: firebase.firestore.FieldValue.increment(-1) });
                }
            });
            container.scrollTop = container.scrollHeight;
        });
        await convRef.update({ [`unreadCount.${currentUser.uid}`]: 0 });
        
        document.getElementById("sendMsg").onclick = async () => {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;
            await convRef.collection("messages").add({
                fromUid: currentUser.uid, toUid: otherId, text: text,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                read: false
            });
            await convRef.update({
                lastMessage: text,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
                [`unreadCount.${otherId}`]: firebase.firestore.FieldValue.increment(1)
            });
            input.value = "";
        };
        document.getElementById("closeModal").onclick = () => { unsubscribe(); modal.remove(); };
        modal.onclick = (e) => { if (e.target === modal) { unsubscribe(); modal.remove(); } };
    }
    
    // ========== PROFIL (avec PHOTO DE PROFIL comme TikTok) ==========
    async function loadProfil(container) {
        const userDoc = await db.collection("users").doc(currentUser.uid).get();
        const userData = userDoc.data() || {};
        let myReels = [], myProducts = [];
        try {
            const reelSnap = await db.collection("reels").where("userId", "==", currentUser.uid).get();
            myReels = reelSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const prodSnap = await db.collection("products").where("userId", "==", currentUser.uid).get();
            myProducts = prodSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        } catch(e) {}
        
        container.innerHTML = `
            <div class="container">
                <div class="profile-header">
                    <div style="position: relative; display: inline-block;">
                        <img src="${currentUser.photoURL || 'https://via.placeholder.com/100'}" class="profile-avatar" id="profileAvatar">
                        <button id="changePhotoBtn" style="position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;">📷</button>
                    </div>
                    <h2>${currentUser.displayName || "Anonyme"}</h2>
                    <p>${currentUser.email}</p>
                </div>
                <div class="card">
                    <div class="flex" style="justify-content:space-around;">
                        <div style="text-align:center;"><div style="font-size:1.5rem; font-weight:800;">${myReels.length}</div><div>Reels</div></div>
                        <div style="text-align:center;"><div style="font-size:1.5rem; font-weight:800;">${myProducts.length}</div><div>Produits</div></div>
                    </div>
                </div>
                <div class="card">
                    <h3>📱 Numéro WhatsApp</h3>
                    <p>${userData.phone || "Non renseigné"} - ${userData.phone ? "✅ Alertes urgentes activées" : "❌ Pas d'alertes"}</p>
                    <button id="addPhoneBtn" class="btn">${userData.phone ? "Modifier" : "Ajouter"}</button>
                    <p style="font-size:0.7rem; margin-top:0.5rem;">* Les alertes Breaking News vous seront envoyées sur WhatsApp</p>
                </div>
                <div class="card">
                    <div class="flex" style="justify-content: space-between;">
                        <h3>🎬 Mes Reels</h3>
                        <button id="newReelBtn" class="btn" style="padding:0.3rem 0.8rem;">+ Publier</button>
                    </div>
                    <div class="grid-2" id="myReelsGrid"></div>
                </div>
                <div class="card">
                    <div class="flex" style="justify-content: space-between;">
                        <h3>🛒 Mes produits</h3>
                        <button id="newProductBtn" class="btn" style="padding:0.3rem 0.8rem;">+ Vendre</button>
                    </div>
                    <div class="grid-2" id="myProductsGrid"></div>
                </div>
            </div>
        `;
        
        let reelsHtml = "";
        for (let r of myReels) {
            reelsHtml += `<div><video src="${r.videoUrl}" style="width:100%; aspect-ratio:9/16; object-fit:cover; border-radius:0.5rem;" controls></video></div>`;
        }
        document.getElementById("myReelsGrid").innerHTML = reelsHtml || "<div>Aucun Reel</div>";
        
        let productsHtml = "";
        for (let p of myProducts) {
            productsHtml += `<div><img src="${p.imageUrl}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:0.5rem;"><div style="font-size:0.7rem;">${escapeHtml(p.title)} - ${p.price} FCFA</div></div>`;
        }
        document.getElementById("myProductsGrid").innerHTML = productsHtml || "<div>Aucun produit</div>";
        
        document.getElementById("changePhotoBtn").onclick = () => showProfilePhotoOptions();
        document.getElementById("addPhoneBtn").onclick = () => showEditPhone(userData);
        document.getElementById("newReelBtn").onclick = () => showNewReelForm();
        document.getElementById("newProductBtn").onclick = () => showNewProductForm(document.getElementById("pageContent"));
    }
    
    async function updateProfilePhoto(file) {
        if (!file) return;
        showToast("Upload en cours...", "⏳");
        const ref = storage.ref().child(`profile_photos/${currentUser.uid}`);
        await ref.put(file);
        const photoURL = await ref.getDownloadURL();
        await currentUser.updateProfile({ photoURL: photoURL });
        await db.collection("users").doc(currentUser.uid).update({ photoURL: photoURL });
        showToast("Photo de profil mise à jour !", "✅");
        renderMainApp();
    }
    
    function showProfilePhotoOptions() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content" style="text-align:center;">
                <h3>📸 Photo de profil</h3>
                <div style="margin: 1rem 0;">
                    <button id="takePhotoBtn" class="btn" style="margin: 0.3rem;">📷 Prendre une photo</button>
                    <button id="choosePhotoBtn" class="btn" style="margin: 0.3rem;">🖼️ Choisir dans la galerie</button>
                    <button id="removePhotoBtn" class="btn btn-outline" style="margin: 0.3rem;">🗑️ Supprimer</button>
                </div>
                <input type="file" id="hiddenFileInput" accept="image/*" style="display:none;">
                <button id="closePhotoModal" class="btn btn-outline">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        
        const fileInput = document.getElementById("hiddenFileInput");
        
        document.getElementById("takePhotoBtn").onclick = () => {
            fileInput.setAttribute("capture", "environment");
            fileInput.click();
        };
        
        document.getElementById("choosePhotoBtn").onclick = () => {
            fileInput.removeAttribute("capture");
            fileInput.click();
        };
        
        fileInput.onchange = async (e) => {
            if (e.target.files && e.target.files[0]) {
                modal.remove();
                await updateProfilePhoto(e.target.files[0]);
            }
        };
        
        document.getElementById("removePhotoBtn").onclick = async () => {
            const defaultAvatar = "https://via.placeholder.com/100";
            await currentUser.updateProfile({ photoURL: defaultAvatar });
            await db.collection("users").doc(currentUser.uid).update({ photoURL: defaultAvatar });
            modal.remove();
            showToast("Photo supprimée", "🗑️");
            renderMainApp();
        };
        
        document.getElementById("closePhotoModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function showEditPhone(userData) {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📱 Numéro WhatsApp</h3>
                <p>Recevez les alertes urgentes (Breaking News) directement sur WhatsApp</p>
                <input id="editPhone" value="${userData.phone || ""}" placeholder="+226XXXXXXXXX">
                <button id="savePhone" class="btn">Enregistrer</button>
                <button id="closeModal" class="btn btn-outline">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        
        document.getElementById("savePhone").onclick = async () => {
            const phone = document.getElementById("editPhone").value.trim();
            await db.collection("users").doc(currentUser.uid).update({ phone: phone || null });
            modal.remove();
            showToast("Numéro enregistré ! Vous recevrez les alertes");
            loadProfil(document.getElementById("pageContent"));
        };
        document.getElementById("closeModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    function showNewReelForm() {
        const modal = document.createElement("div");
        modal.className = "modal";
        modal.innerHTML = `
            <div class="modal-content">
                <h3>🎬 Publier un Reel</h3>
                <textarea id="reelDesc" rows="2" placeholder="Description..."></textarea>
                <input id="reelHashtags" placeholder="Hashtags (séparés par des espaces) ex: #afrique #musique">
                <input type="file" id="reelVideo" accept="video/*">
                <button id="submitReel" class="btn">Publier</button>
                <button id="closeModal" class="btn btn-outline">Annuler</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.style.display = "flex";
        
        document.getElementById("submitReel").onclick = async () => {
            const desc = document.getElementById("reelDesc").value.trim();
            const hashtagsStr = document.getElementById("reelHashtags").value.trim();
            const file = document.getElementById("reelVideo").files[0];
            if (!file) { alert("Veuillez sélectionner une vidéo"); return; }
            const hashtags = hashtagsStr.split(/\s+/).filter(h => h.startsWith("#"));
            const ref = storage.ref().child(`reels/${Date.now()}_${file.name}`);
            await ref.put(file);
            const videoUrl = await ref.getDownloadURL();
            await db.collection("reels").add({
                userId: currentUser.uid,
                videoUrl: videoUrl,
                description: desc,
                hashtags: hashtags,
                likes: 0,
                commentsCount: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            modal.remove();
            showToast("Reel publié !");
            loadProfil(document.getElementById("pageContent"));
        };
        document.getElementById("closeModal").onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
    }
    
    // ========== UTILITAIRES ==========
    function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]); }
    
    function showToast(msg, icon = "✅") {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerHTML = `${icon} ${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ========== AUTH ==========
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            await db.collection("users").doc(user.uid).set({
                displayName: user.displayName,
                email: user.email,
                photoURL: user.photoURL,
                online: true,
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            render();
        } else {
            if (onlineInterval) clearInterval(onlineInterval);
            currentUser = null;
            render();
        }
    });
</script>
</body>
</html>
