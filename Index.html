<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Aesmarket – Assistant IA</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-start: #e8ecf1;
      --bg-end: #d0d7e2;
      --glass: rgba(255,255,255,0.75);
      --glass-border: rgba(255,255,255,0.5);
      --user-msg: #0071e3;
      --assistant-msg: #ffffff;
      --assistant-text: #1d1d1f;
      --input-bg: #ffffff;
      --input-border: #c7c7cc;
      --text: #1d1d1f;
      --badge-bg: #e8e8ed;
      --badge-color: #0071e3;
      --send-bg: #0071e3;
      --shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    .dark {
      --bg-start: #1c1c1e;
      --bg-end: #2c2c2e;
      --glass: rgba(44,44,46,0.8);
      --glass-border: rgba(255,255,255,0.08);
      --user-msg: #0a84ff;
      --assistant-msg: #2c2c2e;
      --assistant-text: #f5f5f7;
      --input-bg: #3a3a3c;
      --input-border: #48484a;
      --text: #f5f5f7;
      --badge-bg: #3a3a3c;
      --badge-color: #0a84ff;
      --send-bg: #0a84ff;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center;
      padding: 16px; margin: 0; transition: background 0.5s;
    }

    .app-container {
      width: 100%; max-width: 780px; height: 92vh;
      background: var(--glass); backdrop-filter: blur(30px);
      border-radius: 36px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--glass-border); transition: background 0.3s;
    }

    /* Header amélioré */
    .chat-header {
      padding: 16px 24px; background: linear-gradient(135deg, rgba(0,113,227,0.2), rgba(0,113,227,0.05));
      backdrop-filter: blur(25px); border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .avatar-wrapper {
      width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #0071e3, #40a9ff);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: pointer; flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(0,113,227,0.3);
    }
    .avatar-wrapper svg { width: 24px; height: 24px; fill: white; }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .header-info { display: flex; flex-direction: column; }
    .header-info h2 {
      font-weight: 600; font-size: 1.2rem; color: var(--text);
      letter-spacing: -0.2px; background: linear-gradient(135deg, #0071e3, #40a9ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-info span { font-size: 0.75rem; color: var(--text); opacity: 0.7; font-weight: 500; }
    .header-actions { display: flex; gap: 8px; }

    .icon-btn {
      background: var(--glass); border: 1px solid var(--glass-border);
      border-radius: 100px; padding: 8px 14px; cursor: pointer; font-size: 0.8rem;
      color: var(--text); display: flex; align-items: center; gap: 4px;
      transition: all 0.2s; white-space: nowrap; backdrop-filter: blur(10px);
    }
    .icon-btn:hover { background: rgba(255,255,255,0.7); }
    .icon-btn.active { background: var(--send-bg); color: white; border-color: var(--send-bg); }

    /* Chat */
    .chat-box {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .message {
      max-width: 80%; display: flex; gap: 10px; align-items: flex-end;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-avatar {
      width: 30px; height: 30px; border-radius: 50%; background: var(--badge-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .message-avatar svg { width: 16px; height: 16px; fill: var(--badge-color); }
    .message-bubble {
      padding: 12px 16px; border-radius: 22px; line-height: 1.45;
      font-size: 0.9rem; word-break: break-word; white-space: pre-wrap;
      position: relative;
    }
    .message.user .message-bubble { background: var(--user-msg); color: white; border-bottom-right-radius: 6px; }
    .message.assistant .message-bubble { background: var(--assistant-msg); color: var(--assistant-text); border-bottom-left-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    .speak-btn {
      background: none; border: none; cursor: pointer; font-size: 0.9rem;
      opacity: 0.4; margin-left: 4px; transition: opacity 0.2s;
    }
    .speak-btn:hover { opacity: 0.8; }

    /* Input */
    .chat-input-area {
      padding: 12px 20px 20px; display: flex; gap: 10px; align-items: center;
      background: rgba(255,255,255,0.5); backdrop-filter: blur(20px);
      border-top: 1px solid var(--glass-border);
    }
    #userInput {
      flex: 1; padding: 14px 18px; border-radius: 100px;
      border: 1px solid var(--input-border); background: var(--input-bg);
      font-size: 0.9rem; outline: none; color: var(--text);
      transition: border 0.2s, box-shadow 0.2s;
    }
    #userInput:focus { border-color: var(--send-bg); box-shadow: 0 0 0 3px rgba(0,113,227,0.15); }
    .input-action {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: var(--glass); color: var(--text); font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .input-action:hover { background: rgba(255,255,255,0.8); }
    #sendBtn { background: var(--send-bg); color: white; }
    #sendBtn:disabled { background: #a0c4ff; }
    .mic-btn.recording { background: #ff3b30; color: white; }

    /* Dashboard */
    .dashboard {
      position: fixed; top: 0; right: 0; width: 300px; height: 100vh;
      background: var(--glass); backdrop-filter: blur(30px);
      box-shadow: -10px 0 30px rgba(0,0,0,0.1);
      transform: translateX(100%); transition: transform 0.3s ease;
      padding: 24px 18px; overflow-y: auto; z-index: 1000;
      border-left: 1px solid var(--glass-border);
    }
    .dashboard.open { transform: translateX(0); }
    .dashboard h3 { margin-bottom: 18px; color: var(--text); font-weight: 600; }
    .dashboard label { display: block; margin: 14px 0 6px; font-weight: 500; color: var(--text); font-size: 0.85rem; }
    .dashboard select { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text); outline: none; }
    .dashboard-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text); }

    .search-indicator {
      background: var(--badge-bg); color: var(--badge-color); align-self: flex-start;
      padding: 4px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 500;
    }

    .file-preview { max-width: 160px; border-radius: 14px; margin-top: 6px; }

    .chat-box::-webkit-scrollbar { width: 4px; }
    .chat-box::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="chat-header">
      <div class="header-left">
        <div class="avatar-wrapper" id="avatarContainer" title="Photo de profil">
          <!-- Logo SVG élégant à la place de l'emoji -->
          <svg viewBox="0 0 24 24" id="defaultLogo">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
        </div>
        <div class="header-info">
          <h2>Aesmarket</h2>
          <span>Assistant personnel</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="dashboardBtn">⚙️</button>
        <button class="icon-btn" id="toggleSearchModeBtn">🔍</button>
        <button class="icon-btn" id="themeToggle">🌗</button>
        <button class="icon-btn" id="newChatBtn">↺</button>
      </div>
    </div>

    <div class="chat-box" id="chatBox">
      <!-- Les messages s'affichent ici -->
    </div>

    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="Écris un message..." autofocus />
      <input type="file" id="fileInput" style="display:none" accept=".pdf,image/*,.txt,.md" />
      <button class="input-action" id="attachBtn">📎</button>
      <button class="input-action mic-btn" id="micBtn">🎤</button>
      <button class="input-action" id="sendBtn">↑</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <button class="dashboard-close" id="dashboardClose">✕</button>
    <h3>Réglages</h3>
    <label>Personnalité</label>
    <select id="personaSelect">
      <option value="default">Standard</option>
      <option value="professeur">Professeur</option>
      <option value="coach">Coach</option>
      <option value="codeur">Codeur</option>
      <option value="poete">Poète</option>
    </select>
    <label>Recherche directe</label>
    <input type="checkbox" id="pureSearchMode" /> Activer (ou /s)
    <button class="icon-btn" id="exportBtn" style="margin-top:20px;">📤 Exporter</button>
  </div>

  <input type="file" id="avatarFileInput" style="display:none" accept="image/*" />

  <script>
    // ================= CONFIGURATION =================
    const GEMINI_API_KEY = "AQ.Ab8RN6JxYSOsyIGimdzc2RxILWjYdSGAUkb9aE4vry-feLQQNw";
    const MODEL_NAME = "gemini-3.5-flash";
    const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:streamGenerateContent?alt=sse&key=${GEMINI_API_KEY}`;
    
    const DUCKDUCKGO_API = "https://api.duckduckgo.com/";

    // Clé imgBB (gratuit) pour l'avatar personnalisé
    const IMGBB_API_KEY = "TA_CLE_IMGBB"; // Remplace par ta clé imgBB
    const IMGBB_URL = `https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`;

    const PERSONAS = {
      default: "Tu es un assistant utile et précis. Réponds en français.",
      professeur: "Tu es un professeur patient. Explique de manière structurée. Réponds en français.",
      coach: "Tu es un coach de vie bienveillant. Motive et encourage. Réponds en français.",
      codeur: "Tu es un expert en programmation. Donne des solutions techniques. Réponds en français.",
      poete: "Tu es un poète sensible. Réponds en vers. Réponds en français."
    };

    // État
    let currentPersona = localStorage.getItem('aesmarket_persona') || 'default';
    let messages = [];
    let pureSearchMode = false;
    let darkMode = localStorage.getItem('aesmarket_dark') === 'true';
    let avatarUrl = localStorage.getItem('aesmarket_avatar') || '';

    // DOM
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const dashboard = document.getElementById('dashboard');
    const dashboardBtn = document.getElementById('dashboardBtn');
    const dashboardClose = document.getElementById('dashboardClose');
    const personaSelect = document.getElementById('personaSelect');
    const pureSearchModeCheckbox = document.getElementById('pureSearchMode');
    const toggleSearchModeBtn = document.getElementById('toggleSearchModeBtn');
    const themeToggle = document.getElementById('themeToggle');
    const newChatBtn = document.getElementById('newChatBtn');
    const exportBtn = document.getElementById('exportBtn');
    const avatarContainer = document.getElementById('avatarContainer');
    const defaultLogo = document.getElementById('defaultLogo');
    const avatarFileInput = document.getElementById('avatarFileInput');

    if (darkMode) document.body.classList.add('dark');
    themeToggle.textContent = darkMode ? '☀️' : '🌙';

    // Gestion de l'avatar
    function updateAvatar(url) {
      // Supprime l'ancien contenu (logo SVG ou image)
      avatarContainer.innerHTML = '';
      if (url) {
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'Avatar';
        avatarContainer.appendChild(img);
      } else {
        // Réaffiche le logo SVG
        avatarContainer.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;
      }
    }

    if (avatarUrl) updateAvatar(avatarUrl);
    else updateAvatar('');

    avatarContainer.addEventListener('click', () => avatarFileInput.click());
    avatarFileInput.addEventListener('change', async () => {
      const file = avatarFileInput.files[0];
      if (!file) return;
      avatarContainer.innerHTML = '⏳';
      const formData = new FormData();
      formData.append('image', file);
      try {
        const resp = await fetch(IMGBB_URL, { method: 'POST', body: formData });
        const data = await resp.json();
        if (data.success) {
          avatarUrl = data.data.url;
          localStorage.setItem('aesmarket_avatar', avatarUrl);
          updateAvatar(avatarUrl);
        } else {
          throw new Error('Échec upload');
        }
      } catch (e) {
        alert('Erreur lors du téléchargement de l\'avatar.');
        updateAvatar(avatarUrl);
      }
      avatarFileInput.value = '';
    });

    // Fonctions d'affichage
    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `
        <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="message-bubble">${content}</div>
        ${role === 'assistant' ? '<button class="speak-btn">🔊</button>' : ''}
      `;
      if (role === 'assistant') {
        div.querySelector('.speak-btn').onclick = () => speakText(content);
      }
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    function addStreamingBubble() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.innerHTML = `<div class="message-avatar">🤖</div><div class="message-bubble" id="streamBubble"></div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return document.getElementById('streamBubble');
    }

    function addSystemMsg(text) {
      const div = document.createElement('div');
      div.className = 'search-indicator';
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speakText(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    }

    // Outils
    function safeCalculate(expr) {
      try {
        const result = new Function('return ' + expr)();
        return `Résultat : ${expr} = ${result}`;
      } catch {
        return "Calcul invalide.";
      }
    }

    async function executeTool(tool, arg) {
      if (tool === 'CALC') return safeCalculate(arg);
      if (tool === 'WEATHER') {
        try {
          const resp = await fetch(`https://wttr.in/${encodeURIComponent(arg)}?format=3`);
          return `Météo ${arg} : ${(await resp.text()).trim()}`;
        } catch { return "Météo indisponible."; }
      }
      return null;
    }

    async function searchWebRaw(query) {
      try {
        const resp = await fetch(`${DUCKDUCKGO_API}?q=${encodeURIComponent(query)}&format=json&no_html=1`);
        const data = await resp.json();
        let result = '';
        if (data.Abstract) result += `📝 ${data.Abstract}\n`;
        if (data.AbstractURL) result += `🔗 ${data.AbstractURL}\n`;
        if (data.RelatedTopics?.length) {
          result += '\n🔹 Liens :\n';
          data.RelatedTopics.slice(0,5).forEach(t => { if (t.Text) result += `- ${t.Text}\n`; });
        }
        return result || "Aucun résultat.";
      } catch { return "Erreur recherche."; }
    }

    // Appel API (streaming)
    async function callApiStream(msgs) {
      const contents = [];
      let sys = '';
      for (const m of msgs) {
        if (m.role === 'system') { sys = m.content; continue; }
        contents.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] });
      }
      const response = await fetch(GEMINI_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents,
          systemInstruction: { parts: [{ text: sys }] },
          generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
        })
      });
      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error?.message || `Erreur ${response.status}`);
      }
      return response;
    }

    async function streamResponse(response, bubble) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let full = '', buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (let line of lines) {
          let data = line.trim();
          if (!data || !data.startsWith('data: ')) continue;
          data = data.slice(6);
          if (data === '[DONE]') break;
          try {
            const parsed = JSON.parse(data);
            const t = parsed.candidates?.[0]?.content?.parts?.[0]?.text || '';
            full += t;
            bubble.textContent = full;
            chatBox.scrollTop = chatBox.scrollHeight;
          } catch(e) {}
        }
      }
      return full;
    }

    // Envoi principal
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      userInput.value = '';

      // Recherche directe
      if (pureSearchMode || text.startsWith('/s ')) {
        const query = text.startsWith('/s ') ? text.slice(3).trim() : text;
        addMessage('user', text);
        addSystemMsg(`🔍 Recherche : ${query}`);
        const results = await searchWebRaw(query);
        addMessage('assistant', results);
        sendBtn.disabled = false;
        userInput.focus();
        return;
      }

      addMessage('user', text);
      messages.push({ role: 'user', content: text });
      if (messages.length === 1) {
        messages.unshift({ role: 'system', content: PERSONAS[currentPersona] });
      }

      // Détection outils/recherche
      let searchQuery = null, toolMatch = null;
      try {
        const checkUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${GEMINI_API_KEY}`;
        const checkBody = {
          contents: messages.filter(m => m.role !== 'system').map(m => ({
            role: m.role === 'assistant' ? 'model' : 'user',
            parts: [{ text: m.content }]
          })),
          systemInstruction: { parts: [{ text: PERSONAS[currentPersona] }] },
          generationConfig: { temperature: 0, maxOutputTokens: 30 }
        };
        const checkResp = await fetch(checkUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(checkBody)
        });
        if (checkResp.ok) {
          const checkData = await checkResp.json();
          const firstWords = checkData.candidates?.[0]?.content?.parts?.[0]?.text || '';
          if (firstWords.startsWith('SEARCH:')) {
            searchQuery = firstWords.replace('SEARCH:', '').trim();
          } else if (firstWords.startsWith('TOOL:')) {
            const m = firstWords.slice(5).trim().match(/^(CALC|WEATHER)\((.+)\)/);
            if (m) toolMatch = { tool: m[1], arg: m[2] };
          }
        }
      } catch(e) {}

      if (toolMatch) {
        addSystemMsg(`🛠️ Outil : ${toolMatch.tool}(${toolMatch.arg})`);
        const toolRes = await executeTool(toolMatch.tool, toolMatch.arg);
        messages.push({ role: 'system', content: toolRes });
      }
      if (searchQuery) {
        addSystemMsg(`🔍 Recherche : ${searchQuery}`);
        const res = await searchWebRaw(searchQuery);
        messages.push({ role: 'system', content: `Résultats "${searchQuery}":\n${res}` });
      }

      // Limiter historique
      let estimated = messages.reduce((s, m) => s + m.content.length / 4, 0);
      while (messages.length > 2 && estimated > 5000) {
        const removed = messages.splice(1, 1)[0];
        estimated -= removed.content.length / 4;
      }

      const bubble = addStreamingBubble();
      try {
        const response = await callApiStream(messages);
        const fullResponse = await streamResponse(response, bubble);
        messages.push({ role: 'assistant', content: fullResponse });
        localStorage.setItem('aesmarket_messages', JSON.stringify(messages));
      } catch (error) {
        bubble.textContent = `❌ Erreur : ${error.message}`;
      } finally {
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // Événements
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
    });

    // Reconnaissance vocale
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'fr-FR';
      recognition.interimResults = false;
      recognition.onresult = (event) => {
        userInput.value = event.results[0][0].transcript;
        sendMessage();
      };
      recognition.onend = () => micBtn.classList.remove('recording');
      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('recording')) recognition.stop();
        else recognition.start();
        micBtn.classList.toggle('recording');
      });
    } else {
      micBtn.disabled = true;
    }

    // UI
    dashboardBtn.addEventListener('click', () => dashboard.classList.toggle('open'));
    dashboardClose.addEventListener('click', () => dashboard.classList.remove('open'));
    personaSelect.value = currentPersona;
    personaSelect.addEventListener('change', () => {
      currentPersona = personaSelect.value;
      localStorage.setItem('aesmarket_persona', currentPersona);
      if (messages.length > 0 && messages[0].role === 'system') messages[0].content = PERSONAS[currentPersona];
    });
    pureSearchModeCheckbox.checked = pureSearchMode;
    pureSearchModeCheckbox.addEventListener('change', () => pureSearchMode = pureSearchModeCheckbox.checked);
    toggleSearchModeBtn.addEventListener('click', () => {
      pureSearchMode = !pureSearchMode;
      pureSearchModeCheckbox.checked = pureSearchMode;
    });

    themeToggle.addEventListener('click', () => {
      darkMode = !darkMode;
      document.body.classList.toggle('dark', darkMode);
      localStorage.setItem('aesmarket_dark', darkMode);
      themeToggle.textContent = darkMode ? '☀️' : '🌙';
    });

    newChatBtn.addEventListener('click', () => {
      if (confirm('Effacer la conversation ?')) {
        messages = [];
        chatBox.innerHTML = '';
        localStorage.removeItem('aesmarket_messages');
        addMessage('assistant', '👋 Nouvelle conversation.');
      }
    });

    exportBtn.addEventListener('click', () => {
      const text = messages.filter(m => m.role !== 'system').map(m => m.content).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'conversation.txt';
      a.click();
    });

    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async () => {
      for (const file of fileInput.files) {
        const reader = new FileReader();
        reader.onload = (e) => {
          const content = e.target.result.slice(0, 2000);
          addMessage('user', `[Fichier: ${file.name}]`);
          messages.push({ role: 'user', content: `[Fichier: ${file.name}]\n${content}` });
          localStorage.setItem('aesmarket_messages', JSON.stringify(messages));
        };
        reader.readAsText(file);
      }
      fileInput.value = '';
    });

    // Initialisation
    function init() {
      const saved = localStorage.getItem('aesmarket_messages');
      if (saved) {
        try {
          messages = JSON.parse(saved);
          chatBox.innerHTML = '';
          messages.forEach(m => { if (m.role !== 'system') addMessage(m.role, m.content); });
        } catch (e) { messages = []; }
      }
      if (messages.length === 0) {
        messages = [{ role: 'system', content: PERSONAS[currentPersona] }];
        addMessage('assistant', '✨ Bienvenue sur Aesmarket ! Comment puis-je vous aider ?');
      }
    }

    init();
  </script>
</body>
</html>
