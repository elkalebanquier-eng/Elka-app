<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELKA👑</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
    }
  .app { display: flex; height: 100vh; flex-direction: column; }
  .header {
      padding: 16px;
      background: #121212;
      border-bottom: 1px solid #2a2a2a;
      text-align: center;
    }
  .logo {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  .status {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
  .status.online { color: #00ff00; }
  .status.offline { color: #ff0000; }
  .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
  .msg {
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
    }
  .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }
  .avatar.user { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
  .avatar.ai { background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }
  .msg-content { flex: 1; }
  .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
  .msg-name { font-weight: 600; font-size: 14px; }
  .msg-time { font-size: 11px; color: #666; }
  .msg-text { line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
  .typing {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }
  .typing span {
      width: 8px;
      height: 8px;
      background: #666;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-8px); }
    }
  .input-area {
      padding: 16px;
      background: #121212;
      border-top: 1px solid #2a2a2a;
    }
  .input-box {
      background: #1a1a1a;
      border: 2px solid transparent;
      border-radius: 16px;
      padding: 3px;
      background-image: linear-gradient(#1a1a1a, #1a1a1a), linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
      background-origin: border-box;
      background-clip: padding-box, border-box;
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    #input {
      flex: 1;
      background: none;
      border: none;
      color: #fff;
      padding: 14px;
      font-size: 15px;
      outline: none;
      resize: none;
      max-height: 120px;
      font-family: inherit;
    }
    #sendBtn {
      background: linear-gradient(45deg, #833ab4, #fd1d1d, #fcb045);
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 4px;
      flex-shrink: 0;
    }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.5; }
  .error {
      background: rgba(255,0,0,0.1);
      border: 1px solid rgba(255,0,0,0.3);
      border-radius: 8px;
      padding: 12px;
      margin: 10px 0;
      color: #ff6b6b;
      font-size: 14px;
    }
  .test-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">ELKA👑</div>
      <div class="status" id="status">Test de connexion...</div>
    </div>

    <div class="messages" id="messages">
      <div style="text-align: center; padding: 40px 20px;">
        <div style="font-size: 48px; margin-bottom: 16px;">👑</div>
        <h2 style="font-size: 24px; margin-bottom: 8px;">ELKA👑 prête!</h2>
        <p style="color: #888; margin-bottom: 20px;">Pose ta question</p>
        <button class="test-btn" onclick="testAPI()">🔍 Tester la connexion API</button>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="input" placeholder="Message ELKA👑..." rows="1"></textarea>
        <button id="sendBtn" onclick="sendMessage()">
          <svg width="20" height="20" fill="none" stroke="white" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const GROQ_API_KEY = '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';
    const MODEL = 'llama-3.3-70b-versatile';

    // Proxy qui marche pour POST sur mobile
    const PROXY = 'https://corsproxy.io/?';
    const API_URL = PROXY + encodeURIComponent('https://api.groq.com/openai/v1/chat/completions');

    let messages = [];
    let isLoading = false;

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' &&!e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function addMessage(role, content, time) {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'msg';
      msgDiv.innerHTML = `
        <div class="avatar ${role}">${role === 'user'? 'T' : '👑'}</div>
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-name">${role === 'user'? 'Toi' : 'ELKA👑'}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-text">${content}</div>
        </div>
      `;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'msg';
      typingDiv.id = 'typing';
      typingDiv.innerHTML = `
        <div class="avatar ai">👑</div>
        <div class="msg-content"><div class="typing"><span></span><span></span></div></div>
      `;
      messagesDiv.appendChild(typingDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    function showError(msg) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error';
      errorDiv.innerHTML = '❌ ' + msg;
      messagesDiv.appendChild(errorDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function testAPI() {
      status.textContent = 'Test en cours...';
      status.className = 'status';
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [{role: 'user', content: 'Dis juste "OK"'}],
            max_tokens: 5
          })
        });

        if (res.ok) {
          status.textContent = '✅ Connexion OK';
          status.className = 'status online';
        } else {
          const err = await res.text();
          status.textContent = '❌ Erreur API';
          status.className = 'status offline';
          showError('Code ' + res.status + ': ' + err.substring(0, 100));
        }
      } catch (e) {
        status.textContent = '❌ Hors ligne';
        status.className = 'status offline';
        showError('Pas de connexion: ' + e.message);
      }
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      const time = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});

      messages.push({role: 'user', content: text});
      addMessage('user', text, time);

      input.value = '';
      input.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;
      showTyping();

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${GROQ_API_KEY}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              {role: 'system', content: 'Tu es ELKA👑, une IA stylée qui répond en français avec des émojis.'},
           ...messages
            ],
            temperature: 0.7,
            max_tokens: 1000,
          }),
        });

        if (!response.ok) {
          const err = await response.text();
          throw new Error('API Error ' + response.status + ': ' + err);
        }

        const data = await response.json();
        removeTyping();

        const aiTime = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
        const aiResponse = data.choices[0].message.content;

        messages.push({role: 'assistant', content: aiResponse});
        addMessage('assistant', aiResponse, aiTime);
        status.textContent = '✅ En ligne';
        status.className = 'status online';

      } catch (error) {
        removeTyping();
        console.error(error);
        status.textContent = '❌ Erreur';
        status.className = 'status offline';
        showError(error.message);
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    // Test auto au démarrage
    window.onload = () => testAPI();
  </script>
</body>
</html>
